<!DOCTYPE html>
<html lang="es" class="dark" style="color-scheme: dark;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sembrador | Escritura Primero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Lora', 'serif'] },
                    colors: { 
                        softdark: '#121212',
                        paper: '#e5e1da',
                        matrix: { 400: '#00C833', 500: '#00FF41' },
                        'm-red': '#f43f5e',   
                        'm-amber': '#f59e0b', 
                        'm-green': '#10b981'  
                    }
                } 
            } 
        }
        mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { darkMode: true, background: '#0a0a0a', primaryColor: '#151515', primaryTextColor: '#e5e1da', primaryBorderColor: '#10b981', lineColor: '#a3a3a3' }, flowchart: { curve: 'basis' }, securityLevel: 'loose' });
    </script>
    <style>
        body { background-color: #121212; color: #d1d1d1; transition: background-color 0.5s ease; overflow-x: hidden; }
        
        .glow-red { box-shadow: 0 0 15px rgba(244, 63, 94, 0.3); }
        .glow-amber { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); }
        .glow-green { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }
        .glow-soft-matrix { box-shadow: 0 0 15px rgba(0, 255, 65, 0.15); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 10px; }
        
        /* Ocultar el marcador por defecto del summary en los acordeones */
        summary { list-style: none; }
        summary::-webkit-details-marker { display: none; }
        
        .collapsible-content { max-height: 2000px; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1); }
        .collapsible-content.is-collapsed { max-height: 0; }
        .progress-container { width: 100%; height: 4px; background: #0a0a0a; border-radius: 10px; position: relative; }
        [contenteditable="true"]:focus { outline: none; }
        #sidebar { transition: margin 0.4s ease-in-out, transform 0.3s ease-in-out; }
        body.desktop-sidebar-collapsed #sidebar { margin-left: -320px; }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col md:flex-row antialiased relative">

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/80 z-40 hidden md:hidden backdrop-blur-sm" onclick="toggleSidebarMobile()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-4/5 md:w-[320px] h-screen border-r border-white/5 bg-[#0f0f0f] flex flex-col z-50 transform -translate-x-full md:translate-x-0 transition-all duration-300">
        <header class="p-6 md:p-8 flex flex-col gap-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xs font-semibold tracking-[0.4em] text-[#e5e1da] uppercase">Sembrador</h1>
                    <p class="text-[9px] text-[#a3a3a3] mt-2 uppercase tracking-widest italic opacity-60">Destilería de Ideas</p>
                </div>
                <button onclick="toggleSidebarMobile()" class="md:hidden text-[#a3a3a3] hover:text-crema p-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <button onclick="nuevoManuscrito()" class="w-full bg-matrix-500/10 text-matrix-500 border border-matrix-500/30 py-4 rounded-xl text-[10px] font-bold tracking-[0.2em] uppercase hover:bg-matrix-500 hover:text-black transition-all">
                + NUEVO MANUSCRITO
            </button>
        </header>
        <nav class="flex border-y border-white/5 text-[9px] font-bold tracking-widest uppercase text-[#a3a3a3]">
            <button onclick="cambiarFiltro('todos')" class="flex-1 py-4 hover:text-white transition-colors border-r border-white/5">Todos</button>
            <button onclick="cambiarFiltro('semilla')" class="flex-1 py-4 hover:text-white transition-colors border-r border-white/5">Semillas</button>
            <button onclick="cambiarFiltro('cosecha')" class="flex-1 py-4 hover:text-white transition-colors">Cosecha</button>
        </nav>
        <div id="historialLateral" class="flex-1 overflow-y-auto pt-4 pb-20 md:pb-4"></div>
    </aside>

    <main class="flex-1 relative transition-all duration-700 w-full bg-[#121212] min-h-screen">
        <header class="main-header sticky top-0 z-20 bg-[#121212]/90 backdrop-blur-md p-4 md:p-6 flex justify-between items-center border-b border-white/5">
            <div class="flex gap-2 md:gap-4 items-center">
                <button onclick="toggleSidebarMobile()" class="md:hidden text-[#a3a3a3] hover:text-white p-2 rounded bg-white/5 border border-white/5">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <button onclick="toggleSidebarDesktop()" class="hidden md:flex items-center gap-2 text-[10px] uppercase tracking-widest font-bold text-[#a3a3a3] hover:text-white p-2 px-4 rounded-lg bg-white/5 border border-white/5">◫ Panel</button>
            </div>
            <div class="nav-links flex gap-6 items-center">
                <button onclick="exportarDatos()" class="text-[#a3a3a3] hover:text-white text-[9px] font-bold uppercase tracking-widest hidden md:block">Backup</button>
                <button onclick="document.getElementById('modalConfig').classList.remove('hidden')" class="text-lg hover:rotate-90 transition-transform">⚙️</button>
            </div>
        </header>
        <div class="max-w-3xl mx-auto py-8 md:py-12 px-4 md:px-8">
            <div id="visorActivo" class="space-y-16 pb-20"></div>
        </div>
    </main>

    <div id="modalConfig" class="hidden fixed inset-0 bg-black/90 z- flex justify-center items-center p-4 backdrop-blur-sm">
        <div class="bg-[#0f0f0f] border border-white/10 p-8 md:p-12 max-w-sm w-full space-y-6 rounded-2xl">
            <h2 class="text-[10px] font-bold tracking-[0.4em] uppercase text-[#e5e1da] border-b border-white/5 pb-4">Configuración</h2>
            <div class="space-y-2">
                <label class="text-[9px] text-[#a3a3a3] uppercase tracking-widest">API Key (OpenRouter)</label>
                <input type="password" id="apiKeyInput" class="w-full bg-[#0a0a0a] border border-white/10 p-4 text-xs text-white outline-none rounded-lg focus:border-matrix-500/50" placeholder="sk-or-v1-...">
            </div>
            <div class="space-y-2">
                <label class="text-[9px] text-[#a3a3a3] uppercase tracking-widest">Modelo IA</label>
                <input type="text" id="apiModelInput" class="w-full bg-[#0a0a0a] border border-white/10 p-4 text-xs text-white outline-none rounded-lg focus:border-matrix-500/50" placeholder="google/gemini-2.0-flash-001">
            </div>
            <div class="flex gap-4 pt-4">
                <button onclick="guardarConfig()" class="flex-1 bg-[#e5e1da] text-black py-4 text-[10px] font-bold uppercase tracking-widest rounded-lg hover:bg-white transition-colors">Guardar</button>
                <button onclick="document.getElementById('modalConfig').classList.add('hidden')" class="flex-1 text-[#a3a3a3] bg-white/5 py-4 text-[10px] font-bold uppercase tracking-widest rounded-lg hover:bg-white/10 transition-colors">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        function safeSet(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} }
        function safeGet(k, d) { try { const i = localStorage.getItem(k); return i ? JSON.parse(i) : d; } catch(e){ return d; } }

        let API_KEY = safeGet('artesano_key', "");
        let API_MODEL = safeGet('artesano_model', "google/gemini-2.0-flash-001");
        let pensamientos = safeGet('artesano_data', []);
        let pensamientoActivoId = null; 
        let isTimerRunning = false;
        let filtroActual = 'todos';
        let tamanoFuenteActual = safeGet('artesano_fuente', '20');

        function nuevoManuscrito() {
            const nuevo = { id: Date.now(), titulo: "BORRADOR NUEVO", texto_fusionado: "", madurez: 0, tiempo_segundos: 0, dialogos: [], mapa_mermaid: "", titulo_manual: false };
            pensamientos.unshift(nuevo);
            safeSet('artesano_data', pensamientos);
            pensamientoActivoId = nuevo.id;
            renderizar();
            setTimeout(() => document.getElementById('textoManuscrito')?.focus(), 100);
        }

        function editarTituloManuscrito(id, nuevo, desdeLateral = false) {
            const p = pensamientos.find(x => x.id === id);
            if(p) {
                p.titulo = nuevo.replace(/[\n\r]/g, '').toUpperCase() || "BORRADOR NUEVO";
                p.titulo_manual = (nuevo.trim() !== "");
                safeSet('artesano_data', pensamientos);
                
                if (desdeLateral) {
                    if (id === pensamientoActivoId) {
                        const titEl = document.getElementById('tituloPrincipalVisor');
                        if (titEl) titEl.innerText = p.titulo;
                    }
                    renderizarLateral();
                } else {
                    renderizarLateral();
                }
            }
        }

        function autoGuardar(id, texto) {
            const p = pensamientos.find(x => x.id === id);
            if(!p) return;
            p.texto_fusionado = texto;
            const charEl = document.getElementById('charCountPrincipal');
            if(charEl) charEl.textContent = texto.length;
            
            if(!p.titulo_manual || p.titulo === "BORRADOR NUEVO") {
                const firstLine = texto.split('\n').substring(0, 35).toUpperCase();
                p.titulo = firstLine || "BORRADOR NUEVO";
                const titEl = document.getElementById('tituloPrincipalVisor');
                if(titEl && document.activeElement !== titEl) titEl.innerText = p.titulo;
            }
            
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(() => { safeSet('artesano_data', pensamientos); renderizarLateral(); }, 800);
        }

        function formatearTiempo(s) {
            const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), seg = s % 60;
            if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
            return `${m.toString().padStart(2,'0')}:${seg.toString().padStart(2,'0')}`;
        }

        function actualizarTiempoManual(id, el) {
            const p = pensamientos.find(x => x.id === id);
            if(!p) return;
            const partes = el.innerText.split(':').map(Number);
            let s = 0;
            if(partes.length === 3) s = (partes*3600) + (partes*60) + partes;
            else if(partes.length === 2) s = (partes*60) + partes;
            p.tiempo_segundos = isNaN(s) ? p.tiempo_segundos : s;
            safeSet('artesano_data', pensamientos);
            el.innerText = formatearTiempo(p.tiempo_segundos);
        }

        function actualizarMadurez(id, valor) {
            const m = parseInt(valor) || 0;
            const p = pensamientos.find(x => x.id === id);
            if(p) {
                p.madurez = m;
                safeSet('artesano_data', pensamientos);
                document.getElementById(`madurez-text-${id}`).innerText = m + '%';
                const slider = document.getElementById(`slider-${id}`);
                if(slider) slider.className = `w-full cursor-pointer transition-colors duration-300 ${m <= 33 ? 'accent-m-red' : m <= 66 ? 'accent-m-amber' : 'accent-m-green'}`;
                renderizarLateral();
            }
        }

        function eliminarDialogo(idManuscrito, indexDialogo) {
            if(confirm('¿Eliminar esta consulta del análisis?')) {
                const p = pensamientos.find(x => x.id === idManuscrito);
                if(p && p.dialogos) {
                    p.dialogos.splice(indexDialogo, 1);
                    safeSet('artesano_data', pensamientos);
                    renderizar();
                }
            }
        }

        setInterval(() => {
            if (isTimerRunning && pensamientoActivoId) {
                const p = pensamientos.find(x => x.id === pensamientoActivoId);
                if (p) {
                    p.tiempo_segundos++;
                    const el = document.getElementById('textoRelojActivo');
                    if (el && document.activeElement !== el) el.textContent = formatearTiempo(p.tiempo_segundos);
                    const elLat = document.getElementById(`time-lat-${p.id}`);
                    if (elLat) elLat.textContent = formatearTiempo(p.tiempo_segundos);
                }
            }
        }, 1000);

        function renderizarLateral() {
            const container = document.getElementById('historialLateral');
            container.innerHTML = "";
            const filtrados = pensamientos.filter(p => {
                if (filtroActual === 'semilla') return p.madurez <= 50;
                if (filtroActual === 'cosecha') return p.madurez > 50;
                return true;
            });
            filtrados.forEach(p => {
                const isActivo = p.id === pensamientoActivoId;
                const m = parseInt(p.madurez) || 0;
                let color = m <= 33 ? 'bg-m-red' : m <= 66 ? 'bg-m-amber' : 'bg-m-green';
                let glow = m <= 33 ? 'glow-red' : m <= 66 ? 'glow-amber' : 'glow-green';
                const item = document.createElement('div');
                item.className = `p-6 mb-2 cursor-pointer transition-all border-l-2 ${isActivo ? 'border-matrix-500 bg-white/[0.04]' : 'border-transparent hover:bg-white/[0.02]'}`;
                item.onclick = () => { pensamientoActivoId = p.id; renderizar(); if(window.innerWidth < 768) toggleSidebarMobile(); };
                item.innerHTML = `
                    <div class="flex justify-between items-start mb-3 group/item">
                        <div contenteditable="true" 
                             onclick="event.stopPropagation()" 
                             onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}"
                             onblur="editarTituloManuscrito(${p.id}, this.innerText, true)"
                             class="text-[10px] font-bold uppercase tracking-[0.15em] ${isActivo ? 'text-[#e5e1da]' : 'text-[#a3a3a3]/60'} outline-none flex-1 pr-4 whitespace-nowrap overflow-hidden text-ellipsis cursor-text hover:text-white transition-colors">
                             ${p.titulo || 'BORRADOR NUEVO'}
                        </div>
                        <button onclick="event.stopPropagation(); if(confirm('¿Eliminar?')){pensamientos=pensamientos.filter(x=>x.id!==${p.id}); safeSet('artesano_data',pensamientos); renderizar();}" class="text-soft/20 hover:text-coral-500 transition-colors">×</button>
                    </div>
                    <div class="font-serif text-[12px] italic text-[#a3a3a3]/40 line-clamp-2 mb-4 leading-relaxed">${p.texto_fusionado || "Sin contenido..."}</div>
                    <div class="flex justify-between items-center text-[8px] font-bold tracking-widest text-[#a3a3a3]/40 uppercase mb-2">
                        <span>MADURACIÓN (${m}%)</span>
                        <span id="time-lat-${p.id}">${formatearTiempo(p.tiempo_segundos)}</span>
                    </div>
                    <div class="progress-container"><div class="h-full ${color} ${glow} transition-all duration-500" style="width: ${m}%"></div></div>
                `;
                container.appendChild(item);
            });
        }

        function renderizar() {
            renderizarLateral();
            const visor = document.getElementById('visorActivo');
            const p = pensamientos.find(x => x.id === pensamientoActivoId);
            
            if(!p) { 
                visor.innerHTML = `
                <div class="flex flex-col items-center justify-center min-h-[60vh] px-4">
                    <div class="text-[#a3a3a3]/20 font-serif italic text-xl md:text-2xl mb-8 text-center">El destilador está vacío...</div>
                    <button onclick="nuevoManuscrito()" class="w-full md:w-auto bg-matrix-500/10 text-matrix-500 border border-matrix-500/30 px-8 py-4 rounded-xl text-[10px] md:text-[11px] font-bold tracking-[0.2em] uppercase hover:bg-matrix-500 hover:text-black transition-all glow-soft-matrix shadow-lg">
                        + Crea un nuevo manuscrito
                    </button>
                </div>`; 
                return; 
            }

            const m = parseInt(p.madurez) || 0;
            let sliderAccentClass = m <= 33 ? 'accent-m-red' : m <= 66 ? 'accent-m-amber' : 'accent-m-green';
            visor.innerHTML = `
                <article class="space-y-12">
                    <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 border-b border-white/5 pb-8">
                        <div class="space-y-3 flex-1 w-full">
                            <div id="tituloPrincipalVisor" contenteditable="true" onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();}" oninput="editarTituloManuscrito(${p.id}, this.innerText, false)" class="text-[11px] md:text-[10px] font-bold tracking-[0.4em] text-[#e5e1da] uppercase outline-none min-h-[1.2em] transition-colors focus:text-matrix-500">${p.titulo || 'BORRADOR NUEVO'}</div>
                            <div class="flex items-center gap-4 font-mono text-[11px] text-matrix-500">
                                <button onclick="isTimerRunning = !isTimerRunning; renderizar();" class="text-lg focus:outline-none transition-transform active:scale-90">${isTimerRunning ? '●' : '○'}</button>
                                <span id="textoRelojActivo" contenteditable="true" onblur="actualizarTiempoManual(${p.id}, this)" class="outline-none min-w-[50px] cursor-edit">${formatearTiempo(p.tiempo_segundos)}</span>
                                <span class="opacity-20 text-[#a3a3a3]">|</span>
                                <span class="text-[#a3a3a3]/60 uppercase tracking-widest text-[9px]"><span id="charCountPrincipal">${p.texto_fusionado.length}</span> caract.</span>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="descargarPDF(${p.id})" class="text-[9px] font-bold border border-white/10 px-5 py-2 rounded-full hover:bg-white/5 uppercase transition-all">PDF</button>
                        </div>
                    </header>
                    
                    <div id="textoManuscrito" contenteditable="true" oninput="autoGuardar(${p.id}, this.innerText)" style="font-size: ${tamanoFuenteActual}px;" class="font-serif text-[#e5e1da] leading-relaxed outline-none min-h-[300px] max-h-[55vh] overflow-y-auto pr-4 whitespace-pre-wrap text-justify">${p.texto_fusionado}</div>
                    
                    <section class="pt-8 border-t border-white/5">
                        <div class="flex justify-between items-center mb-6 group cursor-pointer" onclick="toggleElemento('iaBody', 'iaBtn')">
                            <p class="text-[10px] font-bold tracking-widest text-[#a3a3a3]/40 uppercase">Análisis Objetivo</p>
                            <span id="iaBtn" class="text-[#a3a3a3] text-xl">−</span>
                        </div>
                        <div id="iaBody" class="collapsible-content space-y-6">
                            <div class="flex gap-4 items-center p-4 bg-white/[0.02] rounded-xl border border-white/5">
                                <input type="text" id="inputProfundizar-${p.id}" class="flex-1 bg-transparent border-b border-white/10 p-2 text-sm outline-none focus:border-matrix-500 transition-all" placeholder="Consulta a la IA sobre este texto...">
                                <button onclick="IA_Consulta(${p.id})" id="btnIA-${p.id}" class="bg-white/5 px-6 py-2 text-[9px] font-bold uppercase tracking-widest border border-white/10 rounded-lg hover:bg-white/10 flex-shrink-0">Consultar</button>
                            </div>
                            
                            <div class="space-y-4 max-h-[45vh] overflow-y-auto pr-2">
                                ${(p.dialogos || []).map((d, index) => `
                                    <details class="group bg-[#151515] border border-white/10 rounded-xl overflow-hidden" ${index === 0 ? 'open' : ''}>
                                        <summary class="p-5 cursor-pointer flex justify-between items-center outline-none">
                                            <div class="flex-1 pr-4">
                                                <p class="text-[10px] text-matrix-500 font-bold uppercase line-clamp-2">${d.pregunta}</p>
                                            </div>
                                            <div class="flex items-center gap-4 flex-shrink-0">
                                                <button onclick="event.stopPropagation(); eliminarDialogo(${p.id}, ${index})" class="text-[#a3a3a3]/40 hover:text-m-red transition-colors text-lg leading-none" title="Eliminar consulta">×</button>
                                                <span class="text-[#a3a3a3] text-xs transition-transform duration-300 group-open:rotate-180">▼</span>
                                            </div>
                                        </summary>
                                        <div class="p-5 pt-0">
                                            <div class="border-t border-white/5 pt-4 text-sm font-serif text-[#e5e1da] leading-relaxed text-justify whitespace-pre-wrap">${d.respuesta}</div>
                                        </div>
                                    </details>
                                `).join('')}
                            </div>
                        </div>
                    </section>
                    <footer class="pt-8 border-t border-white/5">
                        <div class="flex justify-between text-[10px] font-bold uppercase text-[#a3a3a3]/40 mb-6"><span>Grado de Maduración</span><span id="madurez-text-${p.id}">${m}%</span></div>
                        <input type="range" id="slider-${p.id}" min="0" max="100" value="${m}" class="w-full cursor-pointer transition-colors duration-300 ${sliderAccentClass}" oninput="actualizarMadurez(${p.id}, this.value)">
                    </footer>
                    <section class="pt-8 border-t border-white/5">
                        <div class="flex justify-between items-center mb-6 group cursor-pointer" onclick="toggleElemento('mapaBody', 'mapaBtn')">
                            <div class="flex items-center gap-4">
                                <p class="text-[10px] font-bold text-[#a3a3a3]/40 uppercase tracking-widest">Estructura Relacional</p>
                                <button onclick="event.stopPropagation(); IA_Mapa(${p.id})" id="btnMap-${p.id}" class="text-[8px] text-matrix-500 border border-matrix-500/20 px-3 py-1 rounded bg-matrix-500/5 hover:bg-matrix-500 hover:text-black transition-all">↻ REGENERAR</button>
                            </div>
                            <span id="mapaBtn" class="text-[#a3a3a3] text-xl">−</span>
                        </div>
                        <div id="mapaBody" class="collapsible-content">
                            <div id="mapaContainer" class="bg-[#0a0a0a] rounded-2xl h-[400px] border border-white/5 relative group overflow-hidden flex items-center justify-center mt-2">
                                <div class="mermaid-canvas w-full h-full flex items-center justify-center">${p.mapa_mermaid || ""}</div>
                                <div id="mapaControls" class="absolute bottom-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-auto">
                                    <button onclick="if(window.mapZoomInstance) window.mapZoomInstance.zoomIn()" class="bg-[#151515] text-white/60 p-3 rounded-lg border border-white/10 hover:bg-white/10 hover:text-white transition-colors">➕</button>
                                    <button onclick="if(window.mapZoomInstance) window.mapZoomInstance.zoomOut()" class="bg-[#151515] text-white/60 p-3 rounded-lg border border-white/10 hover:bg-white/10 hover:text-white transition-colors">➖</button>
                                    <button onclick="if(window.mapZoomInstance) { window.mapZoomInstance.resize(); window.mapZoomInstance.fit(); window.mapZoomInstance.center(); }" class="bg-[#151515] text-white/60 p-3 rounded-lg border border-white/10 hover:bg-white/10 hover:text-white transition-colors">⟲</button>
                                    <button onclick="descargarSVG()" class="bg-[#151515] text-white/60 px-5 py-3 rounded-lg border border-white/10 hover:bg-white/10 hover:text-matrix-500 text-[10px] font-bold uppercase transition-colors">↓ SVG</button>
                                </div>
                            </div>
                        </div>
                    </section>
                </article>`;

            if(p.mapa_mermaid) setTimeout(async () => {
                try { 
                    await mermaid.run({ querySelector: '.mermaid-canvas' });
                    const svg = document.querySelector('.mermaid-canvas svg');
                    if(svg) { 
                        svg.removeAttribute('width'); svg.removeAttribute('height'); svg.removeAttribute('style'); svg.style.width = "100%"; svg.style.height = "100%"; svg.style.maxWidth = "none";
                        window.mapZoomInstance = svgPanZoom(svg, { zoomEnabled: true, panEnabled: true, controlIconsEnabled: false, fit: true, center: true, minZoom: 0.1, maxZoom: 10 }); 
                        setTimeout(() => { window.mapZoomInstance.resize(); window.mapZoomInstance.fit(); window.mapZoomInstance.center(); }, 50);
                        const container = document.getElementById('mapaContainer');
                        const controls = document.getElementById('mapaControls');
                        let timeout;
                        function showControls() { clearTimeout(timeout); controls.classList.add('opacity-100'); timeout = setTimeout(() => controls.classList.remove('opacity-100'), 3500); }
                        container.addEventListener('touchstart', showControls, {passive: true}); container.addEventListener('mouseenter', showControls, {passive: true}); container.addEventListener('mousemove', showControls, {passive: true});
                    }
                } catch(e){}
            }, 100);
        }

        async function IA_Consulta(id) {
            if (!API_KEY) { document.getElementById('modalConfig').classList.remove('hidden'); return; }
            const p = pensamientos.find(x => x.id === id);
            const input = document.getElementById(`inputProfundizar-${id}`);
            const btn = document.getElementById(`btnIA-${id}`);
            const text = document.getElementById('textoManuscrito').innerText;
            if(!input.value.trim()) return;
            btn.disabled = true; btn.innerText = "...";
            try {
                const r = await fetch('https://openrouter.ai/api/v1/chat/completions', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` }, 
                    body: JSON.stringify({ model: API_MODEL, messages: [{role:'system', content:'Analista sobrio y lógico.'}, {role:'user', content:`Texto:\n${text}\n\nPregunta: ${input.value}`}] }) 
                });
                const d = await r.json();
                
                if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
                if (!d.choices || !d.choices) throw new Error("La IA no devolvió una respuesta válida.");
                
                p.dialogos.unshift({ pregunta: input.value, respuesta: d.choices.message.content });
                safeSet('artesano_data', pensamientos); renderizar();
            } catch(e){ 
                alert("Error de API: " + e.message); 
            } finally { 
                btn.disabled = false; btn.innerText = "CONSULTAR"; 
            }
        }

        async function IA_Mapa(id) {
            if (!API_KEY) { document.getElementById('modalConfig').classList.remove('hidden'); return; }
            const p = pensamientos.find(x => x.id === id);
            const btn = document.getElementById(`btnMap-${id}`);
            const text = document.getElementById('textoManuscrito').innerText;
            if (btn) btn.innerText = "...";
            try {
                const r = await fetch('https://openrouter.ai/api/v1/chat/completions', { 
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` }, 
                    body: JSON.stringify({ model: API_MODEL, messages: [{role:'system', content:'Devuelve solo código Mermaid graph TD crudo sin bloques markdown.'}, {role:'user', content:`Texto:\n${text}`}] }) 
                });
                const d = await r.json();
                
                if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
                if (!d.choices || !d.choices) throw new Error("La IA no devolvió una respuesta válida.");
                
                p.mapa_mermaid = d.choices.message.content.replace(/```mermaid/gi, '').replace(/```/g, '').trim();
                safeSet('artesano_data', pensamientos); renderizar();
            } catch(e){ 
                alert("Error de API: " + e.message); 
            } finally {
                if (btn) btn.innerText = "↻ REGENERAR";
            }
        }

        function descargarPDF(id) {
            const p = pensamientos.find(x => x.id == id);
            const el = document.createElement('div');
            el.innerHTML = `<div style="width: 700px; padding: 20px; font-family: 'Lora', serif; background: #fff; color: #000; font-size: 16px; line-height: 1.6; box-sizing: border-box; overflow-wrap: break-word; word-wrap: break-word;"><h1 style="font-family: 'Inter', sans-serif; text-transform: uppercase; border-bottom: 2px solid #ddd; padding-bottom: 10px; margin-bottom: 20px; font-size: 14px; letter-spacing: 1px;">${p.titulo}</h1><div style="white-space: pre-wrap; text-align: justify; word-break: break-word;">${p.texto_fusionado}</div></div>`;
            const opt = { margin: 15, filename: `${p.titulo}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, windowWidth: 800 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            html2pdf().set(opt).from(el).save();
        }

        function descargarSVG() {
            const svg = document.querySelector('.mermaid-canvas svg');
            if(!svg) return;
            const clone = svg.cloneNode(true);
            clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
            clone.style.backgroundColor = "#0a0a0a";
            const blob = new Blob([`<?xml version="1.0" standalone="no"?>\r\n${new XMLSerializer().serializeToString(clone)}`], {type:"image/svg+xml"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Mapa.svg"; a.click();
        }

        function toggleSidebarMobile() { document.getElementById('sidebar').classList.toggle('mobile-sidebar-open'); document.getElementById('sidebarOverlay').classList.toggle('hidden'); document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleSidebarDesktop() { document.body.classList.toggle('desktop-sidebar-collapsed'); }
        function toggleElemento(t, b) { const el = document.getElementById(t); el.classList.toggle('is-collapsed'); document.getElementById(b).innerText = el.classList.contains('is-collapsed') ? "+" : "−"; }
        function cambiarFiltro(f) { filtroActual = f; renderizarLateral(); }
        function guardarConfig() { 
            API_KEY = document.getElementById('apiKeyInput').value; 
            API_MODEL = document.getElementById('apiModelInput').value || "google/gemini-2.0-flash-001";
            safeSet('artesano_key', API_KEY); 
            safeSet('artesano_model', API_MODEL);
            document.getElementById('modalConfig').classList.add('hidden'); 
        }
        function exportarDatos() { const blob = new Blob([JSON.stringify(pensamientos, null, 2)], {type:"application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Sembrador_Backup.json`; a.click(); }

        window.onload = () => { 
            if(pensamientos.length===0) { renderizar(); } else { pensamientoActivoId = pensamientos.id; renderizar(); } 
            document.getElementById('apiKeyInput').value = API_KEY; 
            document.getElementById('apiModelInput').value = API_MODEL;
        };
    </script>
</body>
